name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Required for manual run.'
        required: true

env:
  CARGO_TERM_COLOR: never

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          mkdir -p artifact
          cp target/$TARGET/release/diddo artifact/
          tar -czvf "diddo-${VERSION}-${TARGET}.tar.gz" -C artifact diddo

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: diddo-${{ matrix.target }}
          path: "diddo-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          mkdir -p artifact
          cp target/$TARGET/release/diddo artifact/
          tar -czvf "diddo-${VERSION}-${TARGET}.tar.gz" -C artifact diddo

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: diddo-${{ matrix.target }}
          path: "diddo-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            echo "version=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $ver = $env:GITHUB_REF_NAME.TrimStart('v')
            echo "version=$ver" >> $env:GITHUB_OUTPUT
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Prepare zip
        run: |
          $Version = "${{ steps.version.outputs.version }}"
          $Target = "x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path artifact
          Copy-Item target\release\diddo.exe artifact\
          Compress-Archive -Path artifact\* -DestinationPath "diddo-$Version-$Target.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: diddo-x86_64-pc-windows-msvc
          path: "diddo-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip"

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release
          for f in artifacts/*.tar.gz artifacts/*.zip; do
            [ -f "$f" ] && cp "$f" "release/$(basename "$f")"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
