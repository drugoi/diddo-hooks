name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Required for manual run.'
        required: true

env:
  CARGO_TERM_COLOR: never

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          mkdir -p artifact
          cp target/$TARGET/release/diddo artifact/
          tar -czvf "diddo-${VERSION}-${TARGET}.tar.gz" -C artifact diddo

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: diddo-${{ matrix.target }}
          path: 'diddo-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz'

  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          mkdir -p artifact
          cp target/$TARGET/release/diddo artifact/
          tar -czvf "diddo-${VERSION}-${TARGET}.tar.gz" -C artifact diddo

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: diddo-${{ matrix.target }}
          path: 'diddo-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz'

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            echo "version=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $ver = $env:GITHUB_REF_NAME.TrimStart('v')
            echo "version=$ver" >> $env:GITHUB_OUTPUT
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Prepare zip
        run: |
          $Version = "${{ steps.version.outputs.version }}"
          $Target = "x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path artifact
          Copy-Item target\release\diddo.exe artifact\
          Compress-Archive -Path artifact\* -DestinationPath "diddo-$Version-$Target.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: diddo-x86_64-pc-windows-msvc
          path: 'diddo-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip'

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          GIT_CLIFF_VERSION="2.12.0"
          TARBALL="git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/${TARBALL}" | tar xz
          echo "${GITHUB_WORKSPACE}/git-cliff-${GIT_CLIFF_VERSION}" >> $GITHUB_PATH
          echo "PATH=${GITHUB_WORKSPACE}/git-cliff-${GIT_CLIFF_VERSION}:$PATH" >> $GITHUB_ENV

      - name: Generate release notes
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            git cliff --unreleased --tag "v${VERSION}" -o release_notes.md
          else
            git cliff --current -o release_notes.md
          fi
          if [ -s release_notes.md ]; then
            tail -n +2 release_notes.md > release_notes.tmp && mv release_notes.tmp release_notes.md
          else
            echo "## What's changed" > release_notes.md
            echo "" >> release_notes.md
            echo "- No structured changes recorded." >> release_notes.md
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release
          for f in artifacts/*.tar.gz artifacts/*.zip; do
            [ -f "$f" ] && cp "$f" "release/$(basename "$f")"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Compute SHA256 for release assets
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/drugoi/diddo-hooks/releases/download/v${VERSION}"
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            hash=$(curl -sL "${BASE}/diddo-${VERSION}-${target}.tar.gz" | sha256sum | awk '{print $1}')
            key=$(echo "$target" | tr '-' '_')
            echo "${key}=${hash}" >> $GITHUB_OUTPUT
          done

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone https://x-access-token:${GH_TOKEN}@github.com/drugoi/homebrew-tap.git tap
          cd tap

          sed -i 's/version ".*"/version "'"${VERSION}"'"/' Formula/diddo.rb
          sed -i '/aarch64-apple-darwin/{n;s/sha256 ".*"/sha256 "${{ steps.sha.outputs.aarch64_apple_darwin }}"/}' Formula/diddo.rb
          sed -i '/x86_64-apple-darwin/{n;s/sha256 ".*"/sha256 "${{ steps.sha.outputs.x86_64_apple_darwin }}"/}' Formula/diddo.rb
          sed -i '/aarch64-unknown-linux-gnu/{n;s/sha256 ".*"/sha256 "${{ steps.sha.outputs.aarch64_unknown_linux_gnu }}"/}' Formula/diddo.rb
          sed -i '/x86_64-unknown-linux-gnu/{n;s/sha256 ".*"/sha256 "${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}"/}' Formula/diddo.rb

          git config user.name "Nikita Bayev"
          git config user.email "nikita@bayev.kz"
          git add Formula/diddo.rb
          git commit -m "Update diddo to ${VERSION}"
          git push
